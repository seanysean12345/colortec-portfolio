<!DOCTYPE html>
<html><head><style>*{margin:0;padding:0}body{overflow:hidden;background:#000}canvas{display:block;width:100vw;height:100vh}</style></head>
<body><canvas id="c"></canvas><script>
const canvas=document.getElementById('c'),gl=canvas.getContext('webgl2')||canvas.getContext('webgl');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;gl.viewport(0,0,canvas.width,canvas.height)}
window.addEventListener('resize',resize);resize();
const vertSrc=`attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}`;
const fragSrc=`precision highp float;uniform float u_time;uniform vec2 u_res;
float hash(vec2 p){p=fract(p*vec2(443.897,441.423));p+=dot(p,p.yx+19.19);return fract((p.x+p.y)*p.x);}
float hash3(vec3 p){p=fract(p*vec3(443.897,441.423,437.195));p+=dot(p,p.yzx+19.19);return fract((p.x+p.y+p.z)*p.x);}
float pixelNoise(vec2 uv,float scale,float t){vec2 grid=floor(uv*scale);return hash3(vec3(grid,floor(t)));}
float fog(vec2 uv,float t){float f=0.0;float amp=0.5;float freq=1.0;
for(int i=0;i<4;i++){vec2 p=uv*freq+t*0.04*float(i+1);vec2 g=floor(p);vec2 fr=fract(p);
fr=fr*fr*(3.0-2.0*fr);float a=hash(g);float b=hash(g+vec2(1.0,0.0));float c=hash(g+vec2(0.0,1.0));float d=hash(g+vec2(1.0,1.0));
f+=amp*mix(mix(a,b,fr.x),mix(c,d,fr.x),fr.y);amp*=0.5;freq*=2.0;}return f;}
void main(){vec2 uv=gl_FragCoord.xy/u_res;float loopTime=10.0;float t=u_time*0.3;
float tLoop=mod(u_time,loopTime)/loopTime;float tAngle=tLoop*6.28318;
float pixScale=min(u_res.x,u_res.y)*0.8;
float f1=fog(uv+vec2(sin(tAngle)*0.15,cos(tAngle)*0.1),t);
float f2=fog(uv*1.5+vec2(cos(tAngle*0.7)*0.12,sin(tAngle*0.7)*0.15),t*0.7);
float f3=fog(uv*0.8+vec2(sin(tAngle*1.3)*0.1,cos(tAngle*1.3)*0.08),t*1.3);
float nAngle1=tLoop*6.28318;float nAngle2=tLoop*6.28318*0.8;float nAngle3=tLoop*6.28318*1.2;
float px1=pixelNoise(uv+vec2(sin(nAngle1)*0.1,cos(nAngle1)*0.1),pixScale,sin(nAngle1)*10.0+50.0);
float px2=pixelNoise(uv+vec2(cos(nAngle2)*0.08,sin(nAngle2)*0.08),pixScale*0.6,cos(nAngle2)*8.0+50.0);
float px3=pixelNoise(uv+vec2(sin(nAngle3)*0.12,cos(nAngle3)*0.06),pixScale*0.8,sin(nAngle3)*12.0+50.0);
float fogVal=mix(f1,f2,0.5)*0.7+f3*0.3;float pixVal=mix(px1,px2,0.4);
float combined=mix(fogVal,pixVal,0.05);
float pink=smoothstep(0.3,0.7,fog(uv*2.0+vec2(sin(tAngle*1.1)*0.2,cos(tAngle*0.9)*0.15),t*0.8));
float cyan=smoothstep(0.35,0.75,fog(uv*1.8+vec2(cos(tAngle*0.8)*0.18,sin(tAngle*1.2)*0.12),t*1.1));
float green=smoothstep(0.4,0.8,fog(uv*2.2+vec2(sin(tAngle*1.3)*0.14,cos(tAngle*0.7)*0.16),t*0.6));
float orange=smoothstep(0.45,0.8,fog(uv*1.6+vec2(cos(tAngle*0.6)*0.2,sin(tAngle*1.4)*0.1),t*0.9));
float purple=smoothstep(0.35,0.7,fog(uv*1.4+vec2(sin(tAngle*1.5)*0.12,cos(tAngle*1.1)*0.18),t*1.2));
vec3 gray=vec3(combined*0.6);vec3 col=gray;
col+=vec3(1.0,0.08,0.58)*pink*0.4*pixVal;col+=vec3(0.0,0.94,1.0)*cyan*0.35*px2;
col+=vec3(0.15,0.9,0.3)*green*0.25*px3;col+=vec3(1.0,0.55,0.1)*orange*0.3*pixVal;
col+=vec3(0.55,0.1,0.9)*purple*0.3*px1;
float whitePx=pixelNoise(uv,pixScale*1.2,t*4.0);col+=vec3(whitePx*0.15*step(0.85,whitePx));
float scanline=0.92+0.08*sin(gl_FragCoord.y*1.5+t*2.0);col*=scanline;
float fineScan=0.95+0.05*step(0.5,fract(gl_FragCoord.y*0.5));col*=fineScan;
float grain=hash(gl_FragCoord.xy+fract(t*100.0))*0.08;col+=grain-0.04;
vec2 vig=uv*(1.0-uv);float vigVal=vig.x*vig.y*15.0;vigVal=pow(vigVal,0.3);col*=vigVal;
col*=0.85;gl_FragColor=vec4(col,1.0);}`;
function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();gl.attachShader(prog,compile(gl.VERTEX_SHADER,vertSrc));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fragSrc));gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
const uTime=gl.getUniformLocation(prog,'u_time'),uRes=gl.getUniformLocation(prog,'u_res');
function render(t){gl.uniform1f(uTime,t*0.001);gl.uniform2f(uRes,canvas.width,canvas.height);
gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(render);}requestAnimationFrame(render);
</script></body></html>
