<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sean Richardson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  scrollbar-width: none;
  -ms-overflow-style: none;
}

html::-webkit-scrollbar, body::-webkit-scrollbar {
  display: none;
}

body {
  background: #0a0a0a;
  font-family: 'Space Grotesk', sans-serif;
  color: #fff;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100vh;
}

canvas#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: -1;
  opacity: 0.7;
}

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 2.5rem;
}

.name {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.email {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.8rem;
  transition: color 0.2s;
}

.email:hover { color: #fff; }

.layout {
  display: flex;
  align-items: center;
  height: 100vh;
  width: 100%;
  padding: 0 2.5rem;
}

.project-list {
  position: fixed;
  left: 2.5rem;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  z-index: 10;
}

.project-list button {
  background: #fff;
  border: none;
  width: 32px;
  height: 2px;
  border-radius: 0;
  cursor: pointer;
  padding: 0;
  opacity: 0.3;
  transition: opacity 0.2s;
}

.project-list button:hover {
  opacity: 0.6;
}

.project-list button.active {
  opacity: 1;
}

.showcase {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 62vw;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.video-wrap {
  position: relative;
  width: 100%;
}

.video-wrap video {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 3px;
  transition: opacity 0.3s ease;
}

.project-info {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin-top: 1.2rem;
}

.view-link {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.8rem;
  transition: color 0.2s;
  padding: 0.5rem 0;
}

.view-link:hover {
  color: #fff;
}

footer {
  position: fixed;
  bottom: 1.5rem;
  left: 0; right: 0;
  text-align: center;
  z-index: 10;
}

footer span {
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
}

/* Mobile */
@media (max-width: 768px) {
  body {
    overflow-y: auto;
    height: auto;
  }

  header {
    padding: 1.2rem 1.5rem;
  }

  .layout {
    flex-direction: column;
    height: auto;
    padding: 5rem 1.5rem 4rem;
  }

  .project-list {
    position: relative;
    left: auto;
    top: auto;
    transform: none;
    flex-direction: row;
    gap: 0.5rem;
    width: auto;
    margin-bottom: 1.5rem;
    justify-content: center;
  }

  .showcase {
    position: relative;
    left: auto;
    top: auto;
    transform: none;
    width: 100%;
  }

  footer {
    position: relative;
    bottom: auto;
    padding: 2rem 0 1.5rem;
  }
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<header>
  <span class="name">Sean Richardson</span>
  <a class="email" href="mailto:gerbert813@gmail.com">gerbert813@gmail.com</a>
</header>

<div class="layout">
  <nav class="project-list" id="projectList"></nav>
  <div class="showcase" id="showcase">
    <div class="video-wrap">
      <video id="activeVideo" autoplay muted loop playsinline></video>
    </div>
    <div class="project-info">
      <a class="view-link" id="viewLink" href="#" target="_blank">View Live &rarr;</a>
    </div>
  </div>
</div>

<footer>
  <span>Southern California</span>
</footer>

<script>
const projects = [
  { title: 'Live Stats Dashboard', video: 'img/prophitz.mp4', link: 'https://seanysean12345.github.io/prophitz-leaderboard/' },
  { title: 'Streetwear Store', video: 'img/streetwear.mp4', link: 'https://seanysean12345.github.io/shopify-demos/streetwear.html' },
  { title: 'Coffee Brand Store', video: 'img/coffee.mp4', link: 'https://seanysean12345.github.io/shopify-demos/coffee.html' },
  { title: 'Tech Store', video: 'img/tech.mp4', link: 'https://seanysean12345.github.io/shopify-demos/tech-store.html' },
];

const listEl = document.getElementById('projectList');
const videoEl = document.getElementById('activeVideo');
const linkEl = document.getElementById('viewLink');
let current = 0;

projects.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.addEventListener('click', () => switchProject(i));
  listEl.appendChild(btn);
});

function switchProject(index) {
  if (index === current && videoEl.src) return;
  current = index;
  const p = projects[index];

  videoEl.style.opacity = '0';

  setTimeout(() => {
    videoEl.src = p.video;
    videoEl.load();
    videoEl.play();
    linkEl.href = p.link;
    videoEl.style.opacity = '1';
  }, 300);

  listEl.querySelectorAll('button').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
}

switchProject(0);

// === SHADER (ultra-light: 2 octaves, quarter res, 15fps) ===
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl');
if (gl) {
  function resize() {
    canvas.width = Math.floor(window.innerWidth * 0.25);
    canvas.height = Math.floor(window.innerHeight * 0.25);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize); resize();
  const vs = `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
  const fs = `precision mediump float;
uniform float t;uniform vec2 r;
float h(vec2 p){p=fract(p*vec2(443.8,441.4));p+=dot(p,p.yx+19.19);return fract((p.x+p.y)*p.x);}
float fog(vec2 u,float t){float f=0.0,a=0.5,q=1.0;
for(int i=0;i<2;i++){vec2 p=u*q+t*0.04*float(i+1);vec2 g=floor(p);vec2 r=fract(p);
r=r*r*(3.0-2.0*r);f+=a*mix(mix(h(g),h(g+vec2(1,0)),r.x),mix(h(g+vec2(0,1)),h(g+vec2(1,1)),r.x),r.y);
a*=0.5;q*=2.0;}return f;}
void main(){vec2 u=gl_FragCoord.xy/r;float T=t*0.3;
float lp=mod(t,10.0)/10.0*6.283;
float f1=fog(u+vec2(sin(lp)*0.15,cos(lp)*0.1),T);
float f2=fog(u*1.5+vec2(cos(lp*0.7)*0.12,sin(lp*0.7)*0.15),T*0.7);
float v=mix(f1,f2,0.5);
float pk=smoothstep(0.3,0.7,fog(u*2.0+vec2(sin(lp*1.1)*0.2,cos(lp*0.9)*0.15),T*0.8));
float cy=smoothstep(0.35,0.75,fog(u*1.8+vec2(cos(lp*0.8)*0.18,sin(lp*1.2)*0.12),T*1.1));
float pu=smoothstep(0.35,0.7,fog(u*1.4+vec2(sin(lp*1.5)*0.12,cos(lp*1.1)*0.18),T*1.2));
vec3 c=vec3(v*0.5);
c+=vec3(1.0,0.08,0.58)*pk*0.3;c+=vec3(0.0,0.94,1.0)*cy*0.25;c+=vec3(0.55,0.1,0.9)*pu*0.25;
vec2 vi=u*(1.0-u);c*=pow(vi.x*vi.y*15.0,0.3)*0.85;
gl_FragColor=vec4(c,1);}`;
  function mk(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const pg=gl.createProgram();
  gl.attachShader(pg,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(pg,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pg);gl.useProgram(pg);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const a=gl.getAttribLocation(pg,'a');gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  const ut=gl.getUniformLocation(pg,'t'),ur=gl.getUniformLocation(pg,'r');
  let last=0;
  function draw(now){
    requestAnimationFrame(draw);
    if(now-last<66)return;
    last=now;
    gl.uniform1f(ut,now*0.001);
    gl.uniform2f(ur,canvas.width,canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
