<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sean Richardson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  font-family: 'Space Grotesk', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

canvas#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: -1;
  opacity: 0.4;
}

/* Header */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 2rem;
}

.name { font-size: 1.05rem; font-weight: 600; }

.header-right a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.75rem;
  transition: color 0.2s;
}
.header-right a:hover { color: #fff; }

.tabs {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.04);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 0.65rem 1.4rem;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  border: none;
  background: none;
  white-space: nowrap;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
  font-family: inherit;
}
.tab:hover { color: rgba(255,255,255,0.6); }
.tab.active { color: #fff; border-bottom-color: #fff; }

/* Main */
main { padding-top: 100px; }

.category { display: none; }
.category.active { display: block; }

.cat-header { padding: 1.5rem 2rem 1rem; }
.cat-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.25rem; }
.cat-desc { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

/* AUTO-SCROLLING CAROUSEL */
.carousel-outer {
  position: relative;
  overflow: hidden;
  padding: 0.5rem 0 2rem;
}

.carousel-track {
  display: flex;
  gap: 1.5rem;
  animation: scroll-left 30s linear infinite;
  width: max-content;
}

.carousel-track:hover {
  animation-play-state: paused;
}

@keyframes scroll-left {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Cards — BIG, 50vh */
.card {
  flex: 0 0 auto;
  width: 55vh;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
  transition: all 0.3s;
}
.card:hover {
  border-color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
}

.card-img {
  width: 100%;
  height: 38vh;
  object-fit: cover;
  display: block;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.card-body { padding: 1.1rem 1.2rem; }
.card-body h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.35rem; }
.card-body p { font-size: 0.78rem; line-height: 1.5; color: rgba(255,255,255,0.5); }
.card-link {
  display: inline-block;
  margin-top: 0.5rem;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.2s;
}
.card-link:hover { color: #fff; }

/* No-image projects at bottom */
.text-projects {
  padding: 2rem;
  max-width: 1000px;
  margin: 0 auto;
}
.text-projects h3 {
  font-size: 0.9rem;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.7rem;
}
.text-item {
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 2rem;
}
.text-item-title { font-size: 0.85rem; font-weight: 500; }
.text-item-desc { font-size: 0.75rem; color: rgba(255,255,255,0.35); text-align: right; }

/* Contact */
.contact-section {
  text-align: center;
  padding: 3rem 2rem;
}
.contact-section a {
  color: #fff;
  font-size: 1rem;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.contact-section p {
  color: rgba(255,255,255,0.3);
  margin-top: 0.5rem;
  font-size: 0.8rem;
}

@media (max-width: 768px) {
  .card { width: 80vw; }
  .card-img { height: 30vh; }
  .header-top { padding: 0.7rem 1rem; }
  .cat-header { padding: 1rem; }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
  <div class="header-top">
    <span class="name">Sean Richardson</span>
    <div class="header-right">
      <a href="mailto:seandrives009@gmail.com">Contact</a>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-cat="all">ALL</button>
    <button class="tab" data-cat="web">WEB</button>
    <button class="tab" data-cat="design">DESIGN</button>
  </div>
</header>

<main id="main"></main>

<script>
// ONLY projects with real matching images
const withImages = [
  // WEB
  { cat: 'web', title: 'Prophitz Crypto Leaderboard', img: 'img/prophitz.jpg',
    desc: 'Animated counters, live stats, sortable tables, prize charts. 3 design concepts.',
    link: 'https://seanysean12345.github.io/prophitz-leaderboard/' },
  { cat: 'web', title: 'Shopify Storefront Demos', img: 'img/shopify.jpg',
    desc: 'Custom product grids, responsive layouts, cart functionality.',
    link: 'https://seanysean12345.github.io/shopify-demos/' },

  // DESIGN
  { cat: 'design', title: 'SK Dasher — Logo & Brand', img: 'img/sk-dasher-logo.png',
    desc: 'Full brand identity. Logo, palette, typography, guidelines.' },
  { cat: 'design', title: 'Empire Overview', img: 'img/empire-overview.jpg',
    desc: 'Strategic planning infographic — system architecture and workflow automation.' },
  { cat: 'design', title: 'Recursive Self-Improvement', img: 'img/recursive-improvement.jpg',
    desc: '8 iterations refined through progressive prompt engineering.' },
  { cat: 'design', title: 'Valentine Demon Series', img: 'img/valentine-art.jpg',
    desc: '16-iteration AI art series. Dark romantic, demon/angel aesthetic.' },
  { cat: 'design', title: 'Reverse Prompting', img: 'img/reverse-prompting.jpg',
    desc: 'Visual breakdown of AI taste profiling through reaction analysis.' },
  { cat: 'design', title: 'Discord Workflow Maps', img: 'img/discord-workflows.jpg',
    desc: 'Multi-channel automation, scheduling, and notification routing.' },
  { cat: 'design', title: 'Calendar & Scheduling', img: 'img/calendar-prep.jpg',
    desc: 'AI-generated planning and scheduling workflow visualization.' },
  { cat: 'design', title: 'Todo System Design', img: 'img/todo-tackler.jpg',
    desc: 'Task management system infographic with priority flows.' },
  { cat: 'design', title: 'Weekly Check-in Dashboard', img: 'img/weekly-checkin.jpg',
    desc: 'Automated check-in workflow visualization and status tracking.' },
];

// Projects without images — listed at bottom
const noImages = [
  { title: 'Autonomous AI Agent', desc: 'Multi-platform, persistent memory, self-healing' },
  { title: 'Audio Stem Separation', desc: 'ML pipeline, 6-stem split, under 60 seconds' },
  { title: 'Semantic Search Engine', desc: '14,000+ chunks, OpenAI embeddings' },
  { title: 'Automated Outreach', desc: '20+ simultaneous conversations, browser automation' },
  { title: 'Grant Application Writer', desc: 'Research, eligibility matching, full drafts' },
  { title: 'WooCommerce 503 Fix', desc: 'CPU spikes eliminated, DB optimization' },
  { title: 'GLSL Shader Backgrounds', desc: 'Procedural fog, seamless loop, zero bandwidth' },
  { title: 'AI Video Generation', desc: 'Remotion + Veo + ElevenLabs voiceover' },
  { title: 'Content Automation', desc: 'Transcription, summarization, cross-posting' },
];

const cats = {
  all: { title: 'All Work', desc: 'Web development, design, and AI systems.' },
  web: { title: 'Web Development', desc: 'Sites, apps, and live demos.' },
  design: { title: 'Design', desc: 'Brand identity, infographics, AI art.' },
};

function makeCards(items) {
  // Duplicate for infinite scroll
  const doubled = [...items, ...items];
  return doubled.map(p => `
    <div class="card">
      <img class="card-img" src="${p.img}" alt="${p.title}" loading="lazy">
      <div class="card-body">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        ${p.link ? `<a class="card-link" href="${p.link}" target="_blank">VIEW LIVE →</a>` : ''}
      </div>
    </div>
  `).join('');
}

function buildCat(key) {
  const info = cats[key];
  const items = key === 'all' ? withImages : withImages.filter(p => p.cat === key);
  // Adjust scroll speed based on number of items
  const dur = items.length * 5;
  return `
    <div class="category${key === 'all' ? ' active' : ''}" id="cat-${key}">
      <div class="cat-header">
        <div class="cat-title">${info.title}</div>
        <div class="cat-desc">${info.desc}</div>
      </div>
      <div class="carousel-outer">
        <div class="carousel-track" style="animation-duration:${dur}s">
          ${makeCards(items)}
        </div>
      </div>
      ${key === 'all' ? `
        <div class="text-projects">
          <h3>Also built (no visuals yet)</h3>
          ${noImages.map(p => `
            <div class="text-item">
              <span class="text-item-title">${p.title}</span>
              <span class="text-item-desc">${p.desc}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>`;
}

document.getElementById('main').innerHTML =
  Object.keys(cats).map(buildCat).join('') +
  `<div class="contact-section">
    <a href="mailto:seandrives009@gmail.com">seandrives009@gmail.com</a>
    <p>Southern California</p>
  </div>`;

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('cat-' + tab.dataset.cat).classList.add('active');
  });
});

// === ULTRA-LIGHT SHADER ===
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl');
if (gl) {
  function resize() {
    canvas.width = Math.floor(window.innerWidth * 0.25);
    canvas.height = Math.floor(window.innerHeight * 0.25);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize); resize();
  const vs = `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
  const fs = `precision mediump float;
uniform float t;uniform vec2 r;
float h(vec2 p){p=fract(p*vec2(443.8,441.4));p+=dot(p,p.yx+19.19);return fract((p.x+p.y)*p.x);}
float fog(vec2 u,float t){float f=0.0,a=0.5,q=1.0;
for(int i=0;i<2;i++){vec2 p=u*q+t*0.04*float(i+1);vec2 g=floor(p);vec2 r=fract(p);
r=r*r*(3.0-2.0*r);f+=a*mix(mix(h(g),h(g+vec2(1,0)),r.x),mix(h(g+vec2(0,1)),h(g+vec2(1,1)),r.x),r.y);
a*=0.5;q*=2.0;}return f;}
void main(){vec2 u=gl_FragCoord.xy/r;float T=t*0.3;
float lp=mod(t,10.0)/10.0*6.283;
float f1=fog(u+vec2(sin(lp)*0.15,cos(lp)*0.1),T);
float f2=fog(u*1.5+vec2(cos(lp*0.7)*0.12,sin(lp*0.7)*0.15),T*0.7);
float v=mix(f1,f2,0.5);
float pk=smoothstep(0.3,0.7,fog(u*2.0+vec2(sin(lp*1.1)*0.2,cos(lp*0.9)*0.15),T*0.8));
float cy=smoothstep(0.35,0.75,fog(u*1.8+vec2(cos(lp*0.8)*0.18,sin(lp*1.2)*0.12),T*1.1));
float pu=smoothstep(0.35,0.7,fog(u*1.4+vec2(sin(lp*1.5)*0.12,cos(lp*1.1)*0.18),T*1.2));
vec3 c=vec3(v*0.5);
c+=vec3(1.0,0.08,0.58)*pk*0.3;c+=vec3(0.0,0.94,1.0)*cy*0.25;c+=vec3(0.55,0.1,0.9)*pu*0.25;
vec2 vi=u*(1.0-u);c*=pow(vi.x*vi.y*15.0,0.3)*0.85;
gl_FragColor=vec4(c,1);}`;
  function mk(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const pg=gl.createProgram();
  gl.attachShader(pg,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(pg,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pg);gl.useProgram(pg);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const a=gl.getAttribLocation(pg,'a');gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  const ut=gl.getUniformLocation(pg,'t'),ur=gl.getUniformLocation(pg,'r');
  let last=0;
  function draw(now){
    requestAnimationFrame(draw);
    if(now-last<66)return;
    last=now;
    gl.uniform1f(ut,now*0.001);
    gl.uniform2f(ur,canvas.width,canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
