<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sean Richardson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scrollbar-width: none;
}

html::-webkit-scrollbar {
  display: none;
}

body {
  background: #000;
  font-family: 'Space Grotesk', sans-serif;
  color: #fff;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  font-smoothing: antialiased;
}

canvas#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: -1;
  opacity: 0.7;
}

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.65rem 2rem;
}
.name { font-size: 1.05rem; font-weight: 600; }
.header-right a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.75rem;
  transition: color 0.2s;
}
.header-right a:hover { color: #fff; }

.tabs {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.04);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 0.5rem 1.2rem;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  border: none;
  background: none;
  white-space: nowrap;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
  font-family: inherit;
}
.tab:hover { color: rgba(255,255,255,0.6); }
.tab.active { color: #fff; border-bottom-color: #fff; }

main { padding-top: 100px; }

.category { display: none; }
.category.active { display: block; }

/* ======= CENTER-STAGE CAROUSEL ======= */
.carousel-outer {
  position: relative;
  padding: 4rem 0 3rem;
  min-height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: pan-y;
}

.carousel-track {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.card-wrapper {
  position: absolute;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-wrapper.center {
  transform: translateX(0) scale(1);
  opacity: 1;
  z-index: 3;
}

.card-wrapper.left {
  transform: translateX(-70%) scale(0.75);
  opacity: 0.4;
  z-index: 2;
}

.card-wrapper.right {
  transform: translateX(70%) scale(0.75);
  opacity: 0.4;
  z-index: 2;
}

.card-wrapper.hidden {
  transform: translateX(0) scale(0.7);
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}

/* ======= CARDS ======= */
.card {
  width: 40vw;
  max-height: 65vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.card:hover { 
  opacity: 0.9;
}

.card-img, .card-video {
  max-width: 100%;
  max-height: 65vh;
  display: block;
  border-radius: 2px;
}

/* ======= DOT INDICATORS ======= */
.carousel-dots {
  position: absolute;
  bottom: 0.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.6rem;
  z-index: 10;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  padding: 6px;
}

.dot:hover {
  background: rgba(255,255,255,0.4);
}

.dot.active {
  background: #fff;
  transform: scale(1.2);
}

/* ======= TEXT LIST ======= */
.text-list {
  max-width: 800px;
  margin: 0 auto;
  padding: 1.5rem 2rem 2rem;
}
.text-list-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.25);
  margin-bottom: 0.75rem;
}
.text-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 1.5rem;
}
.text-row span:first-child { font-size: 0.82rem; font-weight: 500; }
.text-row span:last-child { font-size: 0.72rem; color: rgba(255,255,255,0.3); text-align: right; }

.contact-section {
  text-align: center;
  padding: 2.5rem 2rem 3rem;
}
.contact-section a {
  color: #fff; font-size: 0.95rem; text-decoration: none;
}
.contact-section p {
  color: rgba(255,255,255,0.25); margin-top: 0.5rem; font-size: 0.75rem;
}

@media (max-width: 768px) {
  .card { width: 70vw; max-height: 50vh; }
  .card-img, .card-video { max-height: 50vh; }
  .header-top { padding: 0.7rem 1rem; }
  .text-list { padding: 1rem; }
  .carousel-outer { min-height: auto; }
  .card-wrapper.left { transform: translateX(-85%) scale(0.7); }
  .card-wrapper.right { transform: translateX(85%) scale(0.7); }
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<header>
  <div class="header-top">
    <span class="name">Sean Richardson</span>
    <div class="header-right"><a href="mailto:seandrives009@gmail.com">Contact</a></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-cat="all">ALL WORK</button>
    <button class="tab" data-cat="design">DESIGN</button>
    <button class="tab" data-cat="web">WEBSITES</button>
  </div>
</header>

<main>
  <div class="category active" id="cat-all">
    <div class="carousel-outer">
      <div class="carousel-container">
        <div class="carousel-track" id="track-all"></div>
      </div>
      <div class="carousel-dots" id="dots-all"></div>
    </div>
  </div>

  <div class="category" id="cat-design">
    <div class="carousel-outer">
      <div class="carousel-container">
        <div class="carousel-track" id="track-design"></div>
      </div>
      <div class="carousel-dots" id="dots-design"></div>
    </div>
  </div>

  <div class="category" id="cat-web">
    <div class="carousel-outer">
      <div class="carousel-container">
        <div class="carousel-track" id="track-web"></div>
      </div>
      <div class="carousel-dots" id="dots-web"></div>
    </div>
  </div>

  <div class="contact-section">
    <a href="mailto:seandrives009@gmail.com">seandrives009@gmail.com</a>
    <p>Southern California</p>
  </div>
</main>

<script>
const work = [
  { cat: 'design', title: '24K Dashooter — Logo', img: 'img/24k-dashooter-logo.jpg' },
  { cat: 'design', title: '24K Dashooter — Birthday Invite', img: 'img/birthday-card.jpg' },
  { cat: 'web', title: 'Prophitz × Razed Leaderboard', video: 'img/prophitz.mp4',
    desc: '$5,000 prize pool. Animated counters, live stats, sortable rankings.',
    link: 'https://seanysean12345.github.io/prophitz-leaderboard/' },
  { cat: 'web', title: 'Streetwear Store', video: 'img/streetwear.mp4',
    desc: 'Shopify storefront. Product grid, responsive layout, full cart.',
    link: 'https://seanysean12345.github.io/shopify-demos/streetwear.html' },
  { cat: 'web', title: 'Coffee Shop Store', video: 'img/coffee.mp4',
    desc: 'Shopify storefront. Clean product display, mobile-first design.',
    link: 'https://seanysean12345.github.io/shopify-demos/coffee.html' },
  { cat: 'web', title: 'Tech Accessories Store', video: 'img/tech.mp4',
    desc: 'Shopify storefront. Product cards, category filters, responsive.',
    link: 'https://seanysean12345.github.io/shopify-demos/tech-store.html' },
];

function card(p) {
  const media = p.video
    ? `<video class="card-video" src="${p.video}" autoplay muted loop playsinline></video>`
    : `<img class="card-img" src="${p.img}" alt="${p.title}" loading="lazy">`;
  return `<div class="card" ${p.link ? `onclick="window.open('${p.link}','_blank')" style="cursor:pointer"` : ''}>${media}</div>`;
}

// Carousel class
class Carousel {
  constructor(trackId, dotsId, items) {
    this.track = document.getElementById(trackId);
    this.dotsContainer = document.getElementById(dotsId);
    this.items = items;
    this.currentIndex = 0;
    this.autoplayInterval = null;
    this.touchStartX = 0;
    this.touchEndX = 0;
    
    this.init();
  }
  
  init() {
    // Create cards
    this.items.forEach((item, index) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = card(item);
      this.track.appendChild(wrapper);
    });
    
    // Create dots
    this.items.forEach((_, index) => {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.addEventListener('click', () => this.goTo(index));
      this.dotsContainer.appendChild(dot);
    });
    
    // Touch events
    this.track.addEventListener('touchstart', (e) => {
      this.touchStartX = e.changedTouches[0].screenX;
    });
    
    this.track.addEventListener('touchend', (e) => {
      this.touchEndX = e.changedTouches[0].screenX;
      this.handleSwipe();
    });
    
    this.updatePositions();
    this.startAutoplay();
  }
  
  updatePositions() {
    const wrappers = this.track.querySelectorAll('.card-wrapper');
    const dots = this.dotsContainer.querySelectorAll('.dot');
    
    wrappers.forEach((wrapper, index) => {
      wrapper.classList.remove('center', 'left', 'right', 'hidden');
      dots[index].classList.remove('active');
      
      if (index === this.currentIndex) {
        wrapper.classList.add('center');
        dots[index].classList.add('active');
      } else if (index === (this.currentIndex - 1 + this.items.length) % this.items.length) {
        wrapper.classList.add('left');
      } else if (index === (this.currentIndex + 1) % this.items.length) {
        wrapper.classList.add('right');
      } else {
        wrapper.classList.add('hidden');
      }
    });
  }
  
  goTo(index) {
    this.currentIndex = index;
    this.updatePositions();
    this.resetAutoplay();
  }
  
  next() {
    this.currentIndex = (this.currentIndex + 1) % this.items.length;
    this.updatePositions();
  }
  
  prev() {
    this.currentIndex = (this.currentIndex - 1 + this.items.length) % this.items.length;
    this.updatePositions();
  }
  
  handleSwipe() {
    if (this.touchEndX < this.touchStartX - 50) {
      this.next();
      this.resetAutoplay();
    }
    if (this.touchEndX > this.touchStartX + 50) {
      this.prev();
      this.resetAutoplay();
    }
  }
  
  startAutoplay() {
    this.autoplayInterval = setInterval(() => this.next(), 3000);
  }
  
  resetAutoplay() {
    clearInterval(this.autoplayInterval);
    this.startAutoplay();
  }
}

// Initialize carousels
const allCarousel = new Carousel('track-all', 'dots-all', work);
const designCarousel = new Carousel('track-design', 'dots-design', work.filter(p => p.cat === 'design'));
const webCarousel = new Carousel('track-web', 'dots-web', work.filter(p => p.cat === 'web'));

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('cat-' + tab.dataset.cat).classList.add('active');
  });
});

// === SHADER (ultra-light: 2 octaves, quarter res, 15fps) ===
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl');
if (gl) {
  function resize() {
    canvas.width = Math.floor(window.innerWidth * 0.25);
    canvas.height = Math.floor(window.innerHeight * 0.25);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize); resize();
  const vs = `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
  const fs = `precision mediump float;
uniform float t;uniform vec2 r;
float h(vec2 p){p=fract(p*vec2(443.8,441.4));p+=dot(p,p.yx+19.19);return fract((p.x+p.y)*p.x);}
float fog(vec2 u,float t){float f=0.0,a=0.5,q=1.0;
for(int i=0;i<2;i++){vec2 p=u*q+t*0.04*float(i+1);vec2 g=floor(p);vec2 r=fract(p);
r=r*r*(3.0-2.0*r);f+=a*mix(mix(h(g),h(g+vec2(1,0)),r.x),mix(h(g+vec2(0,1)),h(g+vec2(1,1)),r.x),r.y);
a*=0.5;q*=2.0;}return f;}
void main(){vec2 u=gl_FragCoord.xy/r;float T=t*0.3;
float lp=mod(t,10.0)/10.0*6.283;
float f1=fog(u+vec2(sin(lp)*0.15,cos(lp)*0.1),T);
float f2=fog(u*1.5+vec2(cos(lp*0.7)*0.12,sin(lp*0.7)*0.15),T*0.7);
float v=mix(f1,f2,0.5);
float pk=smoothstep(0.3,0.7,fog(u*2.0+vec2(sin(lp*1.1)*0.2,cos(lp*0.9)*0.15),T*0.8));
float cy=smoothstep(0.35,0.75,fog(u*1.8+vec2(cos(lp*0.8)*0.18,sin(lp*1.2)*0.12),T*1.1));
float pu=smoothstep(0.35,0.7,fog(u*1.4+vec2(sin(lp*1.5)*0.12,cos(lp*1.1)*0.18),T*1.2));
vec3 c=vec3(v*0.5);
c+=vec3(1.0,0.08,0.58)*pk*0.3;c+=vec3(0.0,0.94,1.0)*cy*0.25;c+=vec3(0.55,0.1,0.9)*pu*0.25;
vec2 vi=u*(1.0-u);c*=pow(vi.x*vi.y*15.0,0.3)*0.85;
gl_FragColor=vec4(c,1);}`;
  function mk(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const pg=gl.createProgram();
  gl.attachShader(pg,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(pg,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pg);gl.useProgram(pg);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const a=gl.getAttribLocation(pg,'a');gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  const ut=gl.getUniformLocation(pg,'t'),ur=gl.getUniformLocation(pg,'r');
  let last=0;
  function draw(now){
    requestAnimationFrame(draw);
    if(now-last<66)return;
    last=now;
    gl.uniform1f(ut,now*0.001);
    gl.uniform2f(ur,canvas.width,canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
